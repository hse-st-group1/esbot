name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run Unit Tests
        run: |
          mvn test -f ./application/backend
      - name: Run BDD Tests
        run: |
          mvn surefire:test -Dtest=*Cucumber* -f ./application/backend      
      - name: Run PMD Linter
        run: |
          mvn verify -f ./application/backend -P pmd-linter
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        id: Depcheck
        with:
          project: 'esbot'
          path: './application/backend/'
          format: 'HTML'
          out: 'reports' # this is the default, no need to specify unless you wish to override it
          args: >
            --failOnCVSS 7
            --enableRetired
      - name: Upload Test results
        uses: actions/upload-artifact@master
        with:
           name: OWASP-Report
           path: ${{github.workspace}}/reports