<mat-form-field appearance="outline" class="chat-input">
    <input
        matInput
        data-testid="message-input-field"
        placeholder="Stelle deine Frage"
        name="messageText"
        [(ngModel)]="text"
    >
    <button data-testid="send-message-button" mat-icon-button matSuffix (click)="send()">
        <mat-icon>send</mat-icon>
    </button>
</mat-form-field>
