@if (sessionService.activeSession(); as activeSession) {
  <div style="padding: 16px; border-bottom: 1px solid #ddd;">
  </div>

  <div class="scroll-container">
    @for (msg of activeSession.messages; track msg) {
      <div class="chat-row" [class.is-me]="msg.isMe" [class.is-other]="!msg.isMe">
        <app-message-card [content]="msg.text" [isMe]="msg.isMe"></app-message-card>
      </div>
    }
    
    @if (activeSession.messages.length === 0) {
      <p style="text-align: center; color: gray; margin-top: 20px;">
        Schreibe die erste Nachricht in dieser Session.
      </p>
    }
  </div>

  <app-message-input></app-message-input>
} @else {
  <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
    <h3 style="color: gray;">Bitte wähle eine Session aus oder erstelle eine neue.</h3>
  </div>
}
